<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Majira Marefu</title>
  <script>
    // SPA redirect for GitHub Pages — rewrites paths into a query string
    // that index.html reads and restores. Pattern from rafgraph/spa-github-pages.
    var pathSegmentsToKeep = 1; // /majira-marefu/ is one segment
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>Loading…</body>
</html>
